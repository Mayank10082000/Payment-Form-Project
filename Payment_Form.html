<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Form</title>
    <link rel="stylesheet" href="Payment_Form.css">
</head>
<body>
    <div class="container">
        <form action="">
            <h1 class="main_heading">Payment Form</h1>
            <hr>
            <p>Required Fields are followed by *</p>
            <h2>User Information</h2>
            <p>Name: * <input type="text" required name="name" placeholder="Enter Name Here"><p>
            <fieldset>
                <legend>Gender * </legend>
                <p>
                    Male <input type="radio" name="gender" id="male" required>
                    Female <input type="radio" name="gender" id="female" required>
                </p>
            </fieldset>
            <p>Address: <textarea name="address" id="address" cols="100" rows="10" placeholder="Enter Address Here"></textarea></p>
            <p>Email: * <input type="email" name="email" id="email" required placeholder="abcde@gmail.com"></p>
            <p>Pincode * <input type="number" name="pincode" id="pincode" required placeholder="123456"></p>
            <h2>Payment Information</h2>
            <p>Card Type: * 
                <select name="card_type" id="card_type" required>
                    <option value="">--Select Card Type--</option>
                    <option value="visa">Visa</option>
                    <option value="mastercard">MasterCard</option>
                    <option value="rupay">Rupay</option>
                </select>
            </p>
            <p>
                Card Number: * <input type="number" name="card_number" id="card_number" required placeholder="1111-2222-3333-4444">
            </p>
            <p>
                Expiration Date: * <input type="date" name="exp_date" id="exp_date" required>
            </p>
            <p>
                CVV: * <input type="password" name="password" id="password" required placeholder="123">
            </p>
            <input type="submit" value="Pay Now">
        </form>
    </div>
</body>
</html>
